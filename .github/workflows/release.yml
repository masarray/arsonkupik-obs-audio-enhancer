name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release tag and DSP gates
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Validate semantic version and release notes
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must match vX.Y.Z, received: $TAG" >&2
            exit 1
          fi
          PROJECT_VERSION="$(sed -nE 's/.*VERSION ([0-9]+\.[0-9]+\.[0-9]+).*/\1/p' CMakeLists.txt | head -n 1)"
          if [[ -z "$PROJECT_VERSION" || "v${PROJECT_VERSION}" != "$TAG" ]]; then
            echo "Tag $TAG does not match CMake project version ${PROJECT_VERSION:-missing}." >&2
            exit 1
          fi
          test -f "docs/releases/${TAG}.md"
          OBS_VERSION="$(tr -d '\r\n ' < cmake/OBS_VERSION.txt)"
          if [[ ! "$OBS_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Pinned OBS version is invalid: $OBS_VERSION" >&2
            exit 1
          fi
          echo "Validated ArSonKuPik $TAG with pinned OBS Studio $OBS_VERSION"
      - name: Configure standalone validation
        run: cmake -S . -B build-test -DCMAKE_BUILD_TYPE=Release -DBUILD_OBS_PLUGIN=OFF -DBUILD_STANDALONE_TESTS=ON -DBUILD_TESTING=ON
      - name: Build standalone validation
        run: cmake --build build-test --config Release --parallel
      - name: Run registered release gates
        run: ctest --test-dir build-test --build-config Release --output-on-failure --timeout 180

  build-windows:
    name: Build Windows release assets
    needs: validate
    runs-on: windows-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Visual Studio environment and build
        shell: pwsh
        run: |
          $vswhere = Join-Path ${env:ProgramFiles(x86)} 'Microsoft Visual Studio\Installer\vswhere.exe'
          $vsInstall = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (-not $vsInstall) { throw 'Visual Studio C++ toolchain was not found.' }
          $vsDevCmd = Join-Path $vsInstall 'Common7\Tools\VsDevCmd.bat'
          $script = Join-Path $PWD 'scripts\build-windows-from-obs-release.ps1'
          cmd /c "`"$vsDevCmd`" -arch=x64 -host_arch=x64 && powershell -NoProfile -ExecutionPolicy Bypass -File `"$script`" -OBSVersion pinned"

      - name: Build Windows portable ZIP
        shell: pwsh
        run: |
          $pkg = Join-Path $PWD 'package-programdata\arsonkupik-obs-audio-enhancer'
          $tag = '${{ github.ref_name }}'
          Compress-Archive -Path $pkg -DestinationPath "ArSonKuPik-OBS-Audio-Enhancer-Windows-x64-$tag.zip" -Force

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Build Windows installer EXE
        shell: pwsh
        run: |
          $version = '${{ github.ref_name }}'.TrimStart('v')
          $iscc = 'C:\Program Files (x86)\Inno Setup 6\ISCC.exe'
          if (-not (Test-Path $iscc)) { throw 'Inno Setup compiler not found.' }
          & $iscc "/DMyAppVersion=$version" "/DSourcePackageDir=$PWD\package-programdata\arsonkupik-obs-audio-enhancer" "$PWD\packaging\windows\arsonkupik-obs-audio-enhancer.iss"
          if ($LASTEXITCODE -ne 0) { throw "Inno Setup failed with exit code $LASTEXITCODE." }

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-windows-assets
          if-no-files-found: error
          path: |
            ArSonKuPik-OBS-Audio-Enhancer-Windows-x64-*.zip
            packaging/windows/output/*.exe

  build-linux:
    name: Build Linux release asset
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build pkg-config libobs-dev
      - name: Configure
        run: cmake -S . -B build-linux -DCMAKE_BUILD_TYPE=Release -DBUILD_OBS_PLUGIN=ON -DBUILD_STANDALONE_TESTS=ON -DBUILD_TESTING=ON
      - name: Build
        run: cmake --build build-linux --config Release --parallel
      - name: Install package tree
        run: cmake --install build-linux --config Release --prefix package-linux
      - name: Create Linux tarball
        run: tar -czf ArSonKuPik-OBS-Audio-Enhancer-Linux-x64-${GITHUB_REF_NAME}.tar.gz -C package-linux .
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-linux-assets
          if-no-files-found: error
          path: ArSonKuPik-OBS-Audio-Enhancer-Linux-x64-*.tar.gz

  github-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [validate, build-windows, build-linux]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: release-assets
      - name: Prepare flat release assets and checksums
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          find release-assets -type f \( -name '*.exe' -o -name '*.zip' -o -name '*.tar.gz' \) -exec cp {} dist/ \;
          ASSET_COUNT="$(find dist -maxdepth 1 -type f | wc -l | tr -d ' ')"
          if [[ "$ASSET_COUNT" != "3" ]]; then
            echo "Expected exactly three binary release assets, found $ASSET_COUNT." >&2
            find dist -maxdepth 1 -type f -print
            exit 1
          fi
          OBS_VERSION="$(tr -d '\r\n ' < cmake/OBS_VERSION.txt)"
          cat > dist/BUILD-METADATA.txt <<EOF
          ArSonKuPik version: ${GITHUB_REF_NAME}
          Source commit: ${GITHUB_SHA}
          OBS Studio build dependency: ${OBS_VERSION}
          Windows runner: windows-latest
          Linux runner: ubuntu-latest
          EOF
          (
            cd dist
            sha256sum *.exe *.zip *.tar.gz BUILD-METADATA.txt > SHA256SUMS.txt
          )
      - name: Publish or update release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          TITLE="ArSonKuPik OBS Audio Enhancer ${TAG}"
          NOTES="docs/releases/${TAG}.md"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/* --clobber
            gh release edit "$TAG" --title "$TITLE" --notes-file "$NOTES"
          else
            gh release create "$TAG" dist/* --verify-tag --title "$TITLE" --notes-file "$NOTES"
          fi

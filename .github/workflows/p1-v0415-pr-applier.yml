name: Apply v0.4.15 P1 engine hardening from PR

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/p1-v0415-engine.ready'

permissions:
  contents: write

jobs:
  apply-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Extract one-shot Python patch
        shell: python
        run: |
          from pathlib import Path
          source = Path('.github/workflows/p1-v0415-engine.yml').read_text(encoding='utf-8').splitlines()
          start = source.index('        run: |') + 1
          end = source.index('      - name: Configure standalone tests')
          body = []
          for line in source[start:end]:
              body.append(line[10:] if line.startswith('          ') else line)
          Path('/tmp/apply_p1.py').write_text('\n'.join(body) + '\n', encoding='utf-8')

      - name: Apply engine patch
        run: python /tmp/apply_p1.py

      - name: Configure standalone tests
        run: cmake -S . -B build-test -DBUILD_OBS_PLUGIN=OFF -DBUILD_STANDALONE_TESTS=ON

      - name: Build standalone tests
        run: cmake --build build-test --config Release

      - name: Run multi-level loudness matrix
        run: ./build-test/arsonkupik_dsp_smoke

      - name: Run realtime engine hardening
        run: ./build-test/arsonkupik_dsp_hardening

      - name: Run preset and bypass transitions
        run: ./build-test/arsonkupik_transition_hardening

      - name: Commit tested P1 changes to PR branch
        run: |
          rm -f .github/workflows/p1-v0415-pr-applier.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Harden v0.4.15 engine CPU and bypass behavior"
          git push origin HEAD:${GITHUB_HEAD_REF}

name: Finalize v0.4.15 P1 engine hardening

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/p1-v0415-finalize.ready'

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Finalize Movie Sub calibration and clean diagnostics
        shell: python
        run: |
          from pathlib import Path
          p = Path('src/arsonkupik_presets.cpp')
          text = p.read_text(encoding='utf-8')
          old = 'p.calibrated_wow_trim_db = 5.58;'
          if old not in text:
              raise SystemExit('Expected Movie Sub calibration was not found')
          p.write_text(text.replace(old, 'p.calibrated_wow_trim_db = 5.61;', 1), encoding='utf-8')
          for path in [
              '.github/p1-v0415-finalize.ready',
              '.github/p1-v0415-diagnostics.ready',
              'docs/internal/p1-v0415-diagnostics.txt',
          ]:
              Path(path).unlink(missing_ok=True)

      - name: Configure standalone tests
        run: cmake -S . -B build-test -DBUILD_OBS_PLUGIN=OFF -DBUILD_STANDALONE_TESTS=ON

      - name: Build standalone tests
        run: cmake --build build-test --config Release

      - name: Run multi-level loudness matrix
        run: ./build-test/arsonkupik_dsp_smoke

      - name: Run realtime engine hardening
        run: ./build-test/arsonkupik_dsp_hardening

      - name: Run preset and bypass transitions
        run: ./build-test/arsonkupik_transition_hardening

      - name: Commit validated P1 engine changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Finalize tested v0.4.15 P1 engine hardening"
          git push origin HEAD:${GITHUB_HEAD_REF}

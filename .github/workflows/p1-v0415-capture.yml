name: Capture v0.4.15 P1 engine patch

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/p1-v0415-capture.ready'

permissions:
  contents: write

jobs:
  apply-commit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Extract and apply P1 patch
        shell: python
        run: |
          from pathlib import Path
          source = Path('.github/workflows/p1-v0415-engine.yml').read_text(encoding='utf-8').splitlines()
          start = source.index('        run: |') + 1
          end = source.index('      - name: Configure standalone tests')
          body = [(line[10:] if line.startswith('          ') else line) for line in source[start:end]]
          patch = Path('/tmp/apply_p1.py')
          patch.write_text('\n'.join(body) + '\n', encoding='utf-8')
          exec(compile(patch.read_text(encoding='utf-8'), str(patch), 'exec'))

      - name: Commit generated P1 code before validation
        run: |
          rm -f .github/p1-v0415-capture.ready
          rm -f .github/workflows/p1-v0415-pr-applier.yml
          rm -f .github/workflows/p1-v0415-capture.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Apply v0.4.15 P1 engine hardening candidate"
          git push origin HEAD:${GITHUB_HEAD_REF}

      - name: Configure standalone tests
        run: cmake -S . -B build-test -DBUILD_OBS_PLUGIN=OFF -DBUILD_STANDALONE_TESTS=ON

      - name: Build standalone tests
        run: cmake --build build-test --config Release

      - name: Run multi-level loudness matrix
        run: ./build-test/arsonkupik_dsp_smoke

      - name: Run realtime engine hardening
        run: ./build-test/arsonkupik_dsp_hardening

      - name: Run preset and bypass transitions
        run: ./build-test/arsonkupik_transition_hardening

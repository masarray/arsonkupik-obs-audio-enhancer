name: Build and Release Windows OBS Plugin

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      obs_version:
        description: 'OBS Studio version/tag to build against, or latest'
        required: true
        default: 'latest'
      publish_release:
        description: 'Create/update GitHub Release from this run'
        required: true
        type: choice
        options: [ 'false', 'true' ]
        default: 'false'
      release_tag:
        description: 'Release tag for manual publish, for example v0.3.0'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build-windows-plugin:
    name: Windows x64 installer and ZIP package
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC x64 and build plugin
        shell: pwsh
        run: |
          $obsVersion = '${{ github.event.inputs.obs_version }}'
          if ([string]::IsNullOrWhiteSpace($obsVersion)) { $obsVersion = 'latest' }

          $vswhere = Join-Path ${env:ProgramFiles(x86)} 'Microsoft Visual Studio\Installer\vswhere.exe'
          $vsInstall = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (-not $vsInstall) { throw 'Visual Studio C++ toolchain was not found.' }

          $vsDevCmd = Join-Path $vsInstall 'Common7\Tools\VsDevCmd.bat'
          if (-not (Test-Path $vsDevCmd)) { throw "VsDevCmd.bat was not found: $vsDevCmd" }

          $script = Join-Path $PWD 'scripts\build-windows-from-obs-release.ps1'
          cmd /c "`"$vsDevCmd`" -arch=x64 -host_arch=x64 && powershell -NoProfile -ExecutionPolicy Bypass -File `"$script`" -OBSVersion `"$obsVersion`""
          if ($LASTEXITCODE -ne 0) { throw "Build script failed with exit code ${LASTEXITCODE}." }

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --yes --no-progress
          if ($LASTEXITCODE -ne 0) { throw "Chocolatey failed to install Inno Setup." }

      - name: Create ready-to-install ZIP and EXE installer
        id: bundle
        shell: pwsh
        run: |
          $pluginName = 'arsonkupik-obs-audio-enhancer'
          $releaseBase = 'ArSonKuPik-OBS-Audio-Enhancer-Windows-x64'
          $pkg = Join-Path $PWD "package-programdata\$pluginName"
          $dll = Join-Path $pkg 'bin\64bit\arsonkupik-obs-audio-enhancer.dll'
          if (-not (Test-Path $dll)) {
            throw 'Built plugin DLL was not found in the ProgramData-ready package.'
          }

          $version = '${{ github.ref_name }}'
          if ('${{ github.event_name }}' -ne 'push' -or -not '${{ github.ref }}'.StartsWith('refs/tags/')) {
            $manualTag = '${{ github.event.inputs.release_tag }}'
            if (-not [string]::IsNullOrWhiteSpace($manualTag)) {
              $version = $manualTag
            } else {
              $version = "dev-${{ github.run_number }}"
            }
          }

          $installerVersion = $version.TrimStart('v')
          if ($installerVersion -notmatch '^\d+(\.\d+){1,3}$') {
            $installerVersion = '0.0.${{ github.run_number }}'
          }

          $dist = Join-Path $PWD 'dist'
          $bundleRoot = Join-Path $dist $releaseBase
          if (Test-Path $dist) { Remove-Item $dist -Recurse -Force }
          New-Item -ItemType Directory -Force -Path $bundleRoot | Out-Null

          Copy-Item -Path $pkg -Destination (Join-Path $bundleRoot $pluginName) -Recurse -Force
          Copy-Item -Path (Join-Path $PWD 'release\install_windows.bat') -Destination (Join-Path $bundleRoot 'install_windows.bat') -Force
          Copy-Item -Path (Join-Path $PWD 'release\uninstall_windows.bat') -Destination (Join-Path $bundleRoot 'uninstall_windows.bat') -Force
          Copy-Item -Path (Join-Path $PWD 'release\README_INSTALL.txt') -Destination (Join-Path $bundleRoot 'README_INSTALL.txt') -Force

          $versionLines = @(
            'ArSonKuPik OBS Audio Enhancer',
            "Version: $version",
            'Build: ${{ github.run_number }}',
            'Commit: ${{ github.sha }}',
            '',
            'User install:',
            '1. Close OBS Studio.',
            '2. Run ArSonKuPik-OBS-Audio-Enhancer-Setup.exe.',
            '3. Restart OBS Studio.',
            '',
            'Advanced manual install:',
            '1. Extract this ZIP.',
            '2. Run install_windows.bat as Administrator or copy the plugin folder manually.'
          )
          $versionLines | Set-Content -Encoding UTF8 -Path (Join-Path $bundleRoot 'VERSION.txt')

          $releaseNotesLines = @(
            "# ArSonKuPik OBS Audio Enhancer $version",
            '',
            'Native OBS Studio audio enhancer plugin release.',
            '',
            '## Recommended for most Windows users',
            "Download ArSonKuPik-OBS-Audio-Enhancer-Setup-$version.exe, close OBS Studio, run the installer, then restart OBS.",
            '',
            '## Advanced/manual Windows install',
            "Download ArSonKuPik-OBS-Audio-Enhancer-Windows-x64-$version.zip, extract it, then run install_windows.bat as Administrator or copy the plugin folder manually.",
            '',
            '## Included Windows assets',
            '- Inno Setup installer EXE for normal users',
            '- Manual install ZIP for advanced users',
            '- SHA256 checksums for both packages',
            '',
            '## macOS and Linux',
            'macOS and Linux packages are planned as separate platform builds. Windows is currently the first packaged release target.'
          )
          $releaseNotesLines | Set-Content -Encoding UTF8 -Path (Join-Path $dist 'RELEASE_NOTES.md')

          $zipName = "$releaseBase-$version.zip"
          $zipPath = Join-Path $PWD $zipName
          if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
          Compress-Archive -Path $bundleRoot -DestinationPath $zipPath -Force

          $iscc = @(
            'C:\Program Files (x86)\Inno Setup 6\ISCC.exe',
            'C:\Program Files\Inno Setup 6\ISCC.exe'
          ) | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $iscc) { throw 'ISCC.exe was not found after installing Inno Setup.' }

          $iss = Join-Path $PWD 'packaging\windows\arsonkupik-obs-audio-enhancer.iss'
          & $iscc "/DMyAppVersion=$installerVersion" "/DMyDisplayVersion=$version" $iss
          if ($LASTEXITCODE -ne 0) { throw "Inno Setup build failed with exit code ${LASTEXITCODE}." }

          $exePath = Join-Path $dist "ArSonKuPik-OBS-Audio-Enhancer-Setup-$installerVersion.exe"
          $releaseExeName = "ArSonKuPik-OBS-Audio-Enhancer-Setup-$version.exe"
          $releaseExePath = Join-Path $PWD $releaseExeName
          if (-not (Test-Path $exePath)) { throw "Installer EXE was not found: $exePath" }
          if (Test-Path $releaseExePath) { Remove-Item $releaseExePath -Force }
          Copy-Item $exePath $releaseExePath -Force

          $zipHash = Get-FileHash -Algorithm SHA256 $zipPath
          "$($zipHash.Hash)  $zipName" | Set-Content -Encoding ASCII -Path "$zipPath.sha256"
          $exeHash = Get-FileHash -Algorithm SHA256 $releaseExePath
          "$($exeHash.Hash)  $releaseExeName" | Set-Content -Encoding ASCII -Path "$releaseExePath.sha256"

          "zip_name=$zipName" >> $env:GITHUB_OUTPUT
          "zip_path=$zipPath" >> $env:GITHUB_OUTPUT
          "zip_sha_path=$zipPath.sha256" >> $env:GITHUB_OUTPUT
          "exe_name=$releaseExeName" >> $env:GITHUB_OUTPUT
          "exe_path=$releaseExePath" >> $env:GITHUB_OUTPUT
          "exe_sha_path=$releaseExePath.sha256" >> $env:GITHUB_OUTPUT
          "release_version=$version" >> $env:GITHUB_OUTPUT

      - name: Upload Windows packages
        uses: actions/upload-artifact@v4
        with:
          name: ArSonKuPik-Windows-Packages-${{ steps.bundle.outputs.release_version }}
          path: |
            ${{ steps.bundle.outputs.exe_path }}
            ${{ steps.bundle.outputs.exe_sha_path }}
            ${{ steps.bundle.outputs.zip_path }}
            ${{ steps.bundle.outputs.zip_sha_path }}

      - name: Create or update GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.publish_release == 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = '${{ github.ref_name }}'
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $manualTag = '${{ github.event.inputs.release_tag }}'
            if ([string]::IsNullOrWhiteSpace($manualTag)) {
              throw 'Manual release requires release_tag, for example v0.3.0.'
            }
            $tag = $manualTag
          }

          if (-not $tag.StartsWith('v')) {
            throw "Release tag must start with v, for example v0.3.0. Got: $tag"
          }

          $exePath = '${{ steps.bundle.outputs.exe_path }}'
          $exeShaPath = '${{ steps.bundle.outputs.exe_sha_path }}'
          $zipPath = '${{ steps.bundle.outputs.zip_path }}'
          $zipShaPath = '${{ steps.bundle.outputs.zip_sha_path }}'
          $notes = Join-Path $PWD 'dist\RELEASE_NOTES.md'

          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag $exePath $exeShaPath $zipPath $zipShaPath --target '${{ github.sha }}' --title "ArSonKuPik OBS Audio Enhancer $tag" --notes-file $notes
          } else {
            gh release upload $tag $exePath $exeShaPath $zipPath $zipShaPath --clobber
          }

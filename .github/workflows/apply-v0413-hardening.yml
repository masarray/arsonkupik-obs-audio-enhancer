name: Apply v0.4.13 hardening patch

on:
  push:
    branches: [main]
    paths:
      - '.github/patches/v0.4.13-hardening.ready'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply hardening patch
        shell: bash
        run: |
          set -euo pipefail
          PATCH_PREFIX=".github/patches/v0.4.13-hardening.patch.gz.b64.part"
          for suffix in 01 02 03 04; do
            test -f "${PATCH_PREFIX}${suffix}"
          done
          cat "${PATCH_PREFIX}"{01,02,03,04} | base64 --decode | gzip -dc > /tmp/v0413.patch
          git apply --check /tmp/v0413.patch
          git apply /tmp/v0413.patch
          rm -f .github/patches/v0.4.13-hardening.patch.gz.b64
          rm -f "${PATCH_PREFIX}"{01,02,03,04}
          rm -f .github/patches/v0.4.13-hardening.ready
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Harden realtime engine for crackle-free stable audio"
          git push origin HEAD:main

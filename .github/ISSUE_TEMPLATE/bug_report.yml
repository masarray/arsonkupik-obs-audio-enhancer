name: Bug report
description: Report a reproducible bug
title: "[Bug] "
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Plugin version
  - type: input
    id: obs
    attributes:
      label: OBS version
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - Linux
        - Other
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
